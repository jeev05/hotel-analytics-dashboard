# Spring Boot Application Properties

# Server Configuration
server.port=9090
server.servlet.context-path=/

# Application Name
spring.application.name=Hotel Scraper API

# Logging Configuration
logging.level.root=INFO
logging.level.com.hotelapi=INFO
logging.level.scraper=INFO

# Request timeout
server.tomcat.connection-timeout=30000

# Static Resources Configuration
# classpath:/static/ is where the Vite build output gets packaged by the Dockerfile.
# The file:frontend/ path is removed — it only works on localhost and breaks in Docker
# because the JAR's working directory has no frontend/ folder at runtime.
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
